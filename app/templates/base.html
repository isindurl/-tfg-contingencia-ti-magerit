<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGERIT v3 — Análisis de Riesgos TI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Calibri, sans-serif; background: #f4f6f9; color: #333; }
    nav { background: #1C2B4A; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #E8A020; text-decoration: none; font-weight: bold; font-size: 16px; }
    nav .links a { color: #ccc; margin-left: 20px; font-size: 14px; }
    nav .links a:hover { color: #fff; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .card { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; border: 1px solid #e0e0e0; }
    .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #1C2B4A; color: #fff; }
    .btn-danger  { background: #E24B4A; color: #fff; }
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .badge-critico { background: #fde8e8; color: #A32D2D; }
    .badge-alto    { background: #fef3e2; color: #854F0B; }
    .badge-medio   { background: #e6f1fb; color: #185FA5; }
    .badge-bajo    { background: #eaf3de; color: #3B6D11; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #1C2B4A; color: #fff; padding: 10px 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #f9f9f9; }
    .flash { padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    .flash-success { background: #eaf3de; color: #3B6D11; }
    .flash-info    { background: #e6f1fb; color: #185FA5; }
    .flash-danger  { background: #fde8e8; color: #A32D2D; }
    input, select, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-top: 4px; }
    label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 12px; }
  </style>
</head>
<body>
<nav>
  <a href="/">MAGERIT v3 — Análisis de Riesgos TI</a>
  <div class="links">
    <a href="/">Dashboard</a>
    <a href="/activos">Activos</a>
    <a href="/riesgos">Riesgos</a>
    <a href="/logout">Cerrar sesión</a>
  </div>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
